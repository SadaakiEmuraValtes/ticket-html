<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
        height: 64px;
        overflow: hidden;
        font-family: 'Segoe UI', 'Hiragino Sans', Arial, sans-serif;
      }
      nav {
        display: flex;
        align-items: center;
        padding: 0 24px;
        height: 64px;
        gap: 4px;
      }
      .logo {
        font-size: 1.2rem;
        font-weight: 800;
        color: white;
        cursor: pointer;
        white-space: nowrap;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
        padding: 6px 10px;
        border-radius: 8px;
        transition: background 0.15s;
      }
      .logo:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .logo .emoji {
        font-size: 1.4rem;
      }
      .spacer {
        flex: 1;
      }
      .nav-btn {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        padding: 7px 14px;
        border-radius: 6px;
        font-size: 0.875rem;
        cursor: pointer;
        border: none;
        background: transparent;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
        font-family: inherit;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .nav-btn.active {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-weight: 600;
      }
      .nav-btn.auth-btn {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.35);
        color: white;
        margin-left: 8px;
      }
      .nav-btn.auth-btn:hover {
        background: rgba(255, 255, 255, 0.28);
      }
      .user-badge {
        color: rgba(255, 255, 255, 0.92);
        font-size: 0.8rem;
        padding: 4px 10px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        white-space: nowrap;
        margin-left: 4px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo" onclick="goTo('#/')">
        <span class="emoji">🎫</span> TicketMart
      </div>
      <div class="spacer"></div>
      <button class="nav-btn" id="link-home" onclick="goTo('#/')">ホーム</button>
      <button class="nav-btn" id="link-mypage" onclick="goTo('#/my-page')">マイページ</button>
      <button class="nav-btn" id="link-disclaimer" onclick="goTo('#/disclaimer')">免責事項</button>
      <span class="user-badge" id="user-badge" style="display:none"></span>
      <button class="nav-btn auth-btn" id="btn-auth" onclick="handleAuth()">ログイン</button>
    </nav>

    <script>
      function goTo(hash) {
        try {
          window.parent.location.hash = hash
        } catch (e) {}
      }

      function handleAuth() {
        try {
          const s = window.parent.ticketStore
          if (s && s.user) {
            s.logout()
          } else {
            goTo('#/login')
          }
        } catch (e) {
          goTo('#/login')
        }
      }

      function update() {
        try {
          const hash = window.parent.location.hash || '#/'
          const s = window.parent.ticketStore

          // アクティブリンク更新
          document
            .querySelectorAll('.nav-btn[id^="link-"]')
            .forEach((el) => el.classList.remove('active'))
          if (!hash || hash === '#/' || hash === '#') {
            document.getElementById('link-home').classList.add('active')
          } else if (hash.startsWith('#/my-page')) {
            document.getElementById('link-mypage').classList.add('active')
          } else if (hash.startsWith('#/disclaimer')) {
            document.getElementById('link-disclaimer').classList.add('active')
          }

          // ユーザー情報更新
          const badge = document.getElementById('user-badge')
          const btn = document.getElementById('btn-auth')
          if (s && s.user) {
            badge.textContent = '👤 ' + s.user.name
            badge.style.display = 'inline'
            btn.textContent = 'ログアウト'
          } else {
            badge.style.display = 'none'
            btn.textContent = 'ログイン'
          }
        } catch (e) {}
      }

      setInterval(update, 350)
      update()
    </script>
  </body>
</html>
